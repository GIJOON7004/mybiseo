name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['20.x', '22.x']

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm run check

      - name: Run tests
        run: pnpm test -- --run
        env:
          # 테스트에 필요한 환경변수는 GitHub Secrets에서 주입
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'test-jwt-secret' }}
          NAVER_AD_API_ACCESS_LICENSE: ${{ secrets.NAVER_AD_API_ACCESS_LICENSE }}
          NAVER_AD_API_SECRET_KEY: ${{ secrets.NAVER_AD_API_SECRET_KEY }}
          NAVER_AD_API_CUSTOMER_ID: ${{ secrets.NAVER_AD_API_CUSTOMER_ID }}
          GOOGLE_PAGESPEED_API_KEY: ${{ secrets.GOOGLE_PAGESPEED_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}

      - name: Security audit
        run: pnpm audit --audit-level=high
        continue-on-error: true  # 경고만, 차단하지 않음 (초기 도입)

  # 아키텍처 가드레일 — 구조적 회귀 방지
  architecture-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check db.ts LOC (must stay under 100 lines as re-export facade)
        run: |
          LOC=$(wc -l < server/db.ts)
          echo "server/db.ts: $LOC lines"
          if [ "$LOC" -gt 100 ]; then
            echo "❌ server/db.ts exceeded 100 lines — domain modules should handle logic"
            exit 1
          fi

      - name: Check circular dependencies
        run: npx madge --circular --extensions ts server/
        continue-on-error: false

      - name: Check for leaked secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true  # 초기 도입 — false positive 정리 후 강제화

  # Lighthouse CI — SEO SaaS 자체 사이트 품질 자동 측정
  lighthouse:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Lighthouse audit
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://mybiseo.com/
            https://mybiseo.com/diagnose
          budgetPath: .github/lighthouse-budget.json
          uploadArtifacts: true
        continue-on-error: true  # 초기 도입 — 기준선 수집 후 강제화
